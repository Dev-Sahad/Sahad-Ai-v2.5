<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahad's AI Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .cyber-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#020617] text-slate-200 font-sans min-h-screen flex flex-col">

    <div id="login-overlay" class="fixed inset-0 bg-[#020617] flex items-center justify-center z-50">
        <div class="bg-[#0f172a] p-8 rounded-2xl border border-blue-500/30 cyber-glow w-80">
            <h2 class="text-xl font-bold mb-6 text-blue-400 text-center">SYSTEM AUTH</h2>
            <input id="pass-field" type="password" placeholder="Access Key" 
                class="w-full bg-black border border-slate-700 p-3 rounded-lg mb-4 outline-none focus:border-blue-500 text-center">
            <button onclick="doLogin()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-lg font-bold transition-all">UNLOCK</button>
        </div>
    </div>

    <header class="p-4 bg-[#0f172a] border-b border-slate-800 flex justify-between items-center">
        <h1 class="font-black text-blue-500 tracking-tighter text-xl italic">SAHAD_AI_v2.5</h1>
        <span class="text-xs text-slate-500 px-2 py-1 border border-slate-700 rounded">LOCAL_HOST:3000</span>
    </header>

    <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-6">
        </div>

    <div class="p-4 bg-[#0f172a] border-t border-slate-800">
        <div class="max-w-4xl mx-auto flex gap-3">
            <input id="user-msg" type="text" placeholder="Command the AI..." 
                class="flex-1 bg-black border border-slate-700 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition-all">
            <button onclick="send()" class="bg-blue-600 p-3 rounded-xl cyber-glow hover:scale-105 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
            </button>
        </div>
    </div>

    <script>
    let authToken = localStorage.getItem('sahad_token');
    if(authToken) document.getElementById('login-overlay').style.display = 'none';

    async function doLogin() {
        const password = document.getElementById('pass-field').value;
        const res = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ password })
        });
        const data = await res.json();
        if(data.token) {
            authToken = data.token;
            localStorage.setItem('sahad_token', authToken);
            document.getElementById('login-overlay').style.display = 'none';
        } else { alert("ACCESS DENIED"); }
    }

    async function send() {
        const input = document.getElementById('user-msg');
        const box = document.getElementById('chat-box');
        const msg = input.value;
        if(!msg) return;

        // Add user message to UI
        box.innerHTML += `<div class="flex justify-end"><div class="bg-blue-600 p-3 rounded-xl rounded-tr-none max-w-[80%]">${msg}</div></div>`;
        input.value = '';
        box.scrollTop = box.scrollHeight;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': authToken },
                body: JSON.stringify({ message: msg })
            });
            const data = await res.json();

            if(data.error) throw new Error(data.error);

            box.innerHTML += `<div class="flex justify-start"><div class="bg-slate-800 border border-slate-700 p-4 rounded-xl rounded-tl-none max-w-[90%] text-sm whitespace-pre-wrap">${data.text}</div></div>`;
        } catch (err) {
            box.innerHTML += `<div class="flex justify-center"><div class="bg-red-900/30 text-red-400 border border-red-500/50 p-2 rounded-lg text-xs font-mono text-center w-full">CRITICAL ERROR: ${err.message}</div></div>`;
        }
        box.scrollTop = box.scrollHeight;
    }
</script>
